name: Deploy Blazor WebAssembly to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Blazor app
        run: dotnet publish ProyectoFinalDAM/ProyectoFinalDAM/ProyectoFinalDAM.csproj -c Release -o release

      - name: Resolve GitHub Pages base path
        id: pages_base
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"

          if [ "$repo_name" = "${owner}.github.io" ]; then
            base_path="/"
          else
            base_path="/${repo_name}/"
          fi

          echo "base_path=${base_path}" >> "$GITHUB_OUTPUT"
          echo "Using base path: ${base_path}"

      - name: Prepare static files for GitHub Pages
        shell: bash
        run: |
          sed -i "s|<base href=\"/\" />|<base href=\"${{ steps.pages_base.outputs.base_path }}\" />|" release/wwwroot/index.html
          cp release/wwwroot/index.html release/wwwroot/404.html
          touch release/wwwroot/.nojekyll

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
